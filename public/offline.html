<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | SEYON ChitVault</title>
    <style>
        :root {
            --bg: #09090b;
            --text: #fafafa;
            --accent: #2563eb;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        p { font-size: 14px; opacity: 0.6; margin-bottom: 30px; max-width: 300px; line-height: 1.6; }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>You are Offline</h1>
    <p>ChitVault is unable to reach the server. Please check your internet connection.</p>
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
</body>
</html>
